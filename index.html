<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Outis冠军支持表 · 分路强度榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 确保全屏背景，无滚动灰色区域 */
        html, body {
            height: 100%;
            background: #0b0e18;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            color: #eef2ff;
            padding: 1rem 0.75rem;
            min-height: 100%;
            background: #0b0e18;
            /* 优化滚动体验 */
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
        }

        /* 头部区域微调 */
        .main-header {
            margin-bottom: 0.8rem;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #8aadff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
        }
        .info-line {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.7rem;
            color: #b9c7f0;
        }
        .stats-text {
            background: #0a0f1a;
            padding: 4px 10px;
            border-radius: 30px;
            white-space: nowrap;
            font-size: 0.7rem;
        }
        .right-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
        }
        .feature-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .feature {
            background: #111722;
            border: 1px solid #2a365a;
            border-radius: 60px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .action-btn {
            background: #191f30;
            border: 1px solid #31406a;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #eef2ff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn.primary {
            background: #2a3e70;
            border-color: #5a82ff;
        }

        /* 筛选区域 - 移动端垂直排列 */
        .filter-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            margin: 0.6rem 0 0;
            background: #0e1322;
            border-radius: 18px;
            padding: 0.6rem;
        }
        .search-box {
            background: #111722;
            border: 1px solid #2d385a;
            border-radius: 48px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4ff;
            font-size: 0.75rem;
            width: 100%;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .filter-cat {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #bfd0ff;
        }
        .filter-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-chip {
            background: #1a2135;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #cfddff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .filter-chip.active {
            background: #3b6eff;
            color: white;
        }
        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .dot-s { background-color: #fbbf24; }
        .dot-a { background-color: #a855f7; }
        .dot-b { background-color: #3b82f6; }
        .dot-c { background-color: #9ca3af; }
        .dot-new { background-color: #f87171; }
        .dot-will { background-color: #86efac; }

        /* 英雄列表表格 - 移动端适配 */
        .position-table {
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #252e4c;
            background: #0b0f1a;
            margin-top: 0.8rem;
        }
        .position-row {
            display: flex;
            border-bottom: 1px solid #1f2742;
        }
        .position-row:last-child {
            border-bottom: none;
        }
        /* 左侧分路图标 - 移动端宽度减小 */
        .row-icon {
            width: 90px;
            flex-shrink: 0;
            background: #0f1424;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.3rem;
            gap: 4px;
            border-right: 1px solid #25305a;
        }
        .lane-svg svg {
            width: 44px;
            height: 44px;
            display: block;
        }
        .lane-count {
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .row-heroes {
            flex: 1;
            background: #0c1020;
            padding: 6px 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .heroes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        /* 英雄卡片 - 移动端缩小 */
        .hero-card {
            width: 70px;
            background: #121826;
            border-radius: 12px;
            border: 1px solid #2c365e;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
        }
        .hero-card:hover {
            transform: translateY(-2px);
            border-color: #5d7eff;
        }
        .hero-card.will-hero .hero-img img {
            filter: grayscale(0.85);
            opacity: 0.8;
        }
        .hero-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1b2338;
            position: relative;
        }
        .hero-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .rank-corner {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: #000000cc;
            backdrop-filter: blur(2px);
            padding: 2px 6px;
            border-radius: 14px;
            font-size: 0.6rem;
            font-weight: 800;
            color: white;
        }
        .rank-S { background: #fbbf24; color: #1f1a0a; }
        .rank-A { background: #a855f7; }
        .rank-B { background: #3b82f6; }
        .rank-C { background: #9ca3af; }
        .status-corner {
            position: absolute;
            top: 4px;
            right: 4px;
            z-index: 3;
        }
        .status-badge-sm {
            font-size: 0.5rem;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 12px;
            background: #000000aa;
            backdrop-filter: blur(2px);
        }
        .status-new { background: #f87171; color: white; }
        .status-will { background: #86efac; color: #1f3a1f; }

        .empty-msg {
            color: #6b7ba5;
            font-size: 0.7rem;
            padding: 12px;
            text-align: center;
            width: 100%;
        }

        footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.6rem;
            color: #64708f;
            border-top: 1px solid #20273f;
            padding-top: 0.8rem;
        }

        /* 小屏手机进一步调整 */
        @media (max-width: 480px) {
            body {
                padding: 0.6rem;
            }
            .row-icon {
                width: 75px;
            }
            .lane-svg svg {
                width: 36px;
                height: 36px;
            }
            .hero-card {
                width: 62px;
            }
            .rank-corner {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            .status-badge-sm {
                font-size: 0.45rem;
                padding: 1px 4px;
            }
            .filter-chip {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="title">⚔️ Outis 英雄支持表（CN）</div>
        <div class="info-line">
            <div class="stats-text" id="heroStatsText">加载中...</div>
            <div class="right-group">
                <div class="feature-row">
                    <div class="feature">⚙️ 强大的Core架构</div>
                    <div class="feature">💨 高性能走砍躲避</div>
                    <div class="feature">🎯 精确意识与监测</div>
                </div>
                <div class="action-bar">
                    <button class="action-btn primary" id="moreBtn">📈 更多内容</button>
                </div>
            </div>
        </div>
    </div>

    <div class="filter-area">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索英雄名称" autocomplete="off">
        </div>
        <div class="filter-group">
            <div class="filter-cat">
                <span class="filter-label">评级</span>
                <div class="filter-options" id="rankFilterGroup">
                    <span data-rank="all" class="filter-chip active">全部</span>
                    <span data-rank="S" class="filter-chip"><span class="dot dot-s"></span>S</span>
                    <span data-rank="A" class="filter-chip"><span class="dot dot-a"></span>A</span>
                    <span data-rank="B" class="filter-chip"><span class="dot dot-b"></span>B</span>
                    <span data-rank="C" class="filter-chip"><span class="dot dot-c"></span>C</span>
                </div>
            </div>
            <div class="filter-cat">
                <span class="filter-label">状态</span>
                <div class="filter-options" id="statusFilterGroup">
                    <span data-status="all" class="filter-chip active">全部</span>
                    <span data-status="new" class="filter-chip"><span class="dot dot-new"></span>NEW</span>
                    <span data-status="will" class="filter-chip"><span class="dot dot-will"></span>WILL</span>
                </div>
            </div>
        </div>
    </div>

    <div id="positionTable" class="position-table"></div>
    <footer>英雄数据基于外部配置 | 点击头像获得彩蛋</footer>
</div>

<script>
    let heroes = [];
    let currentRank = 'all';
    let currentStatus = 'all';
    let searchKeyword = '';

    const tableContainer = document.getElementById('positionTable');
    const searchInput = document.getElementById('searchInput');
    const statsText = document.getElementById('heroStatsText');

    const getImgUrl = (en) => `https://ddragon.leagueoflegends.com/cdn/16.12.1/img/champion/${en}.png`;
    const fallbackIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231d2a44'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='%238aa2ff' font-size='12'%3EOS%3C/text%3E%3C/svg%3E";

    const LANES = [
        { key: "top", label: "上路", iconSvg: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="currentColor" fill-rule="nonzero"><path d="m19 3-4 4H7v8l-4 4V3z"></path><path d="m5 21 4-4h8V9l4-4v16z" opacity="0.2"></path><path d="M10 10h4v4h-4z" opacity="0.2"></path></g></svg>` },
        { key: "jungle", label: "打野", iconSvg: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" fill-rule="nonzero" d="M5.14 2c1.58 1.21 5.58 5.023 6.976 9.953s0 10.047 0 10.047c-2.749-3.164-5.893-5.2-6.18-5.382l-.02-.013C5.45 13.814 3 8.79 3 8.79c3.536.867 4.93 4.279 4.93 4.279C7.558 8.698 5.14 2 5.14 2m14.976 5.907s-1.243 2.471-1.814 4.604c-.235.878-.285 2.2-.29 3.058v.282c.003.347.01.568.01.568s-1.738 2.397-3.38 3.678a27.5 27.5 0 0 0-.208-5.334c.928-2.023 2.846-5.454 5.682-6.856m-2.124-5.331s-2.325 3.052-2.836 6.029c-.11.636-.201 1.194-.284 1.695-.379.584-.73 1.166-1.05 1.733-.033-.125-.06-.25-.095-.375a21 21 0 0 0-1.16-3.08c.053-.146.103-.29.17-.438 0 0 1.814-3.78 5.255-5.564"></path></svg>` },
        { key: "mid", label: "中路", iconSvg: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="currentColor" fill-rule="nonzero"><path d="m15 3-4 4H7v4l-4 4V3zM9 21l4-4h4v-4l4-4v12z" opacity="0.2"></path><path d="M18 3h3v3L6 21H3v-3z"></path></g></svg>` },
        { key: "bot", label: "下路", iconSvg: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="currentColor" fill-rule="nonzero"><path d="m19 3-4 4H7v8l-4 4V3z" opacity="0.2"></path><path d="m5 21 4-4h8V9l4-4v16z"></path><path d="M10 10h4v4h-4z" opacity="0.2"></path></g></svg>` },
        { key: "support", label: "辅助", iconSvg: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" fill-rule="nonzero" d="M12.833 10.833 14.5 17.53v.804L12.833 20h-1.666L9.5 18.333v-.804l1.667-6.696zM7 7.5 9.5 10l-1.667 4.167-2.5-2.5L6.167 10h-2.5L2 7.5zm15 0L20.333 10h-2.5l.834 1.667-2.5 2.5L14.5 10 17 7.5zM13.743 5l.757.833v.834l-1.667 2.5h-1.666L9.5 6.667v-.834L10.257 5z"></path></svg>` }
    ];

    function filterHeroes() {
        let filtered = [...heroes];
        if (currentRank !== 'all') {
            filtered = filtered.filter(h => h.tier === currentRank);
        }
        if (currentStatus !== 'all') {
            filtered = filtered.filter(h => h.status === currentStatus);
        }
        if (searchKeyword.trim() !== '') {
            const kw = searchKeyword.trim().toLowerCase();
            filtered = filtered.filter(h => h.zh.toLowerCase().includes(kw) || h.en.toLowerCase().includes(kw));
        }
        return filtered;
    }

    function groupByLane(arr) {
        const groups = { top: [], mid: [], jungle: [], bot: [], support: [] };
        arr.forEach(h => { if (groups[h.lane]) groups[h.lane].push(h); });
        return groups;
    }

    function render() {
        const filtered = filterHeroes();
        const grouped = groupByLane(filtered);

        let html = '';
        for (let lane of LANES) {
            const laneHeroes = grouped[lane.key] || [];
            const count = laneHeroes.length;
            html += `<div class="position-row">
                        <div class="row-icon">
                            <div class="lane-svg">${lane.iconSvg}</div>
                            <div class="lane-count">${count}</div>
                        </div>
                        <div class="row-heroes">
                            <div class="heroes-grid">`;
            if (count === 0) {
                html += `<div class="empty-msg">✨ 暂无英雄</div>`;
            } else {
                laneHeroes.forEach(hero => {
                    let rankHtml = '';
                    if (hero.tier && ['S','A','B','C'].includes(hero.tier)) {
                        const rankClass = hero.tier === 'S' ? 'rank-S' : (hero.tier === 'A' ? 'rank-A' : (hero.tier === 'B' ? 'rank-B' : 'rank-C'));
                        rankHtml = `<div class="rank-corner ${rankClass}">${hero.tier}</div>`;
                    }
                    let statusHtml = '';
                    if (hero.status === 'new') statusHtml = `<div class="status-badge-sm status-new">NEW</div>`;
                    else if (hero.status === 'will') statusHtml = `<div class="status-badge-sm status-will">WILL</div>`;
                    const willClass = hero.status === 'will' ? 'will-hero' : '';
                    const imgUrl = getImgUrl(hero.en);
                    html += `<div class="hero-card ${willClass}" data-hero-id="${hero.id}" title="${hero.zh}">
                                <div class="hero-img">
                                    <img src="${imgUrl}" alt="${hero.zh}" loading="lazy" onerror="this.src='${fallbackIcon}'">
                                    ${rankHtml}
                                    <div class="status-corner">${statusHtml}</div>
                                </div>
                            </div>`;
                });
            }
            html += `</div></div></div>`;
        }
        tableContainer.innerHTML = html;

        document.querySelectorAll('.hero-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(card.getAttribute('data-hero-id'));
                const hero = heroes.find(h => h.id === id);
                if (hero) {
                    const msgs = [
                        `${hero.zh}：今日对线强度在线！`,
                        `${hero.zh} 版本支援效率↑`,
                        `OS认证，${hero.zh} 团战发挥稳定`,
                        `选 ${hero.zh}，队友压力少一半`,
                        `${hero.zh} 已经在分路打出气势`
                    ];
                    toastMsg(msgs[Math.floor(Math.random() * msgs.length)], 'fun');
                }
            });
        });
    }

    let toastTimer = null;
    function toastMsg(msg, type) {
        let existing = document.getElementById('dynamicToast');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'dynamicToast';
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '20px';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.backgroundColor = '#2d3e6e';
        div.style.color = 'white';
        div.style.padding = '5px 16px';
        div.style.borderRadius = '40px';
        div.style.fontSize = '0.75rem';
        div.style.zIndex = '9999';
        div.style.whiteSpace = 'nowrap';
        div.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
        div.style.border = '1px solid #5a74b0';
        document.body.appendChild(div);
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => div.remove(), 1800);
    }

    function bindEvents() {
        document.querySelectorAll('#rankFilterGroup .filter-chip').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('#rankFilterGroup .filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentRank = this.getAttribute('data-rank');
                render();
            });
        });
        document.querySelectorAll('#statusFilterGroup .filter-chip').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('#statusFilterGroup .filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentStatus = this.getAttribute('data-status');
                render();
            });
        });
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            render();
        });
    }

    async function loadConfig() {
        try {
            const response = await fetch('heroes-config.json');
            const config = await response.json();
            heroes = config.heroes.map((h, idx) => ({ ...h, id: idx }));
            const newCount = heroes.filter(h => h.status === 'new').length;
            const willCount = heroes.filter(h => h.status === 'will').length;
            statsText.innerText = `共 ${heroes.length} 位 · ${newCount} 新增 · ${willCount} 即将推出 · ${config.lastUpdated || '2026.06.15'}`;
            bindEvents();
            render();
        } catch (err) {
            console.error('加载配置失败', err);
            statsText.innerText = '加载配置失败，请检查网络';
        }
    }

    document.getElementById('moreBtn').addEventListener('click', () => toastMsg('🚀 更多内容即将推出', 'fun'));

    loadConfig();
</script>
</body>
</html>
