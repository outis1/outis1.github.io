                            await supabaseClient
                                .from('user_profiles')
                                .upsert({ fingerprint: userFingerprint, user_name: val }, { onConflict: 'fingerprint' });
                        } catch (err) { console.warn(err); }
                    }
                }
            });
            document.getElementById('userNameInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') this.blur();
            });

            document.getElementById('commentLikeBtn').addEventListener('click', handleCommentVoteClick);
            document.getElementById('commentDislikeBtn').addEventListener('click', handleCommentVoteClick);

            document.getElementById('submitCommentBtn').addEventListener('click', submitComment);
            document.getElementById('commentInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault();
                    submitComment(); }
            });

            const uniqueHeroCount = allHeroes.length;
            const newCount = allHeroes.filter(h => h.status === 'new').length;
            const willCount = allHeroes.filter(h => h.status === 'will').length;
            document.getElementById('heroStatsText').innerHTML =
                `共 ${uniqueHeroCount} 位英雄 · ${newCount} 新增 · ${willCount} 即将推出 · 更新于2026.6.15`;

            console.log('✅ Outis 已启动！');

            // ===== 浮动文字特效 =====
            initFloatingText();
        })();

        // ============================================================
        // 🎯 浮动文字特效（18px + 渐变）
        // ============================================================
        function initFloatingText() {
            const MESSAGES = [
                "请发送一段剪辑视频",
                "没什么好抱怨的",
                "每个人都会得到慷慨的补偿",
                "很快你会知道，一切的等待都是有意义的",
                "如果你认为这很难，我认为你不适合我的平台",
                "请不要频繁重复提问没有意义的问题",
                "事情并没有那么简单",
                "当然",
                "我会在2080年发送给你",
                "你至少检查一下后再提问",
                "很快"
            ];

            const GRADIENTS = [
                'linear-gradient(135deg, #8aadff, #a78bfa, #c084fc)',
                'linear-gradient(135deg, #fcd34d, #f59e0b, #fbbf24)',
                'linear-gradient(135deg, #34d399, #22d3ee, #60a5fa)',
                'linear-gradient(135deg, #f472b6, #c084fc, #818cf8)',
                'linear-gradient(135deg, #fb923c, #ef4444, #f97316)',
                'linear-gradient(135deg, #fcd34d, #f472b6, #a78bfa, #22d3ee, #34d399)',
                'linear-gradient(135deg, #2dd4bf, #3b82f6, #8b5cf6)',
                'linear-gradient(135deg, #fbcfe8, #f472b6, #fb7185)',
                'linear-gradient(135deg, #a855f7, #22d3ee)',
                'linear-gradient(135deg, #f59e0b, #ef4444, #ec4899)',
                'linear-gradient(135deg, #fbbf24, #f59e0b, #d97706)',
                'linear-gradient(135deg, #6ee7b7, #34d399, #10b981)',
                'linear-gradient(135deg, #93c5fd, #60a5fa, #3b82f6)',
                'linear-gradient(135deg, #c4b5fd, #a78bfa, #8b5cf6)',
                'linear-gradient(135deg, #fca5a5, #f87171, #ef4444)',
                'linear-gradient(135deg, #fcd34d, #fbbf24, #f59e0b, #f97316)',
                'linear-gradient(135deg, #a7f3d0, #6ee7b7, #34d399, #10b981)',
                'linear-gradient(135deg, #bfdbfe, #93c5fd, #60a5fa, #3b82f6)',
                'linear-gradient(135deg, #e9d5ff, #c4b5fd, #a78bfa, #8b5cf6)',
                'linear-gradient(135deg, #fecaca, #fca5a5, #f87171, #ef4444)',
            ];

            function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            function getClickPos(e) {
                if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                return { x: e.clientX, y: e.clientY };
            }

            function shouldTrigger(target) {
                const interactiveSelectors = [
                    '.vote-btn', '.hero-card', '.filter-chip', '#searchInput',
                    '#adminFab', '#moreBtn', '#commentModal', '#adminModal',
                    '#emojiPicker', '#userNameDisplay', '#userNameInput',
                    '.comment-item', '.reaction', '.close-btn', '.submit-btn',
                    'button', '.action-btn', '.vote-btn-small', '.emoji-btn',
                    '.clear-avatar', '#avatarFileInput', '#adminSubmitBtn',
                    '.pop-text', '.floating-watermark'
                ];
                for (let sel of interactiveSelectors) {
                    if (target.closest(sel)) return false;
                }
                if (target.closest('#commentModal') || target.closest('#adminModal')) return false;
                if (target.closest('#emojiPicker')) return false;
                return true;
            }

            function handleFloatingText(e) {
                const target = e.target;
                if (!shouldTrigger(target)) return;

                const pos = getClickPos(e);
                let { x, y } = pos;
                const OFFSET_Y = 30;
                let targetY = y - OFFSET_Y;

                const vh = window.innerHeight;
                const vw = window.innerWidth;
                const approxHeight = 40;
                if (targetY < 20) targetY = 20;
                if (targetY + approxHeight > vh - 20) targetY = vh - 20 - approxHeight;

                const msg = randomPick(MESSAGES);

                const measureEl = document.createElement('span');
                measureEl.style.cssText =
                    'position:fixed; visibility:hidden; white-space:nowrap; font-size:18px; font-weight:700; letter-spacing:0.03em; font-family:inherit;';
                measureEl.textContent = msg;
                document.body.appendChild(measureEl);
                let textWidth = measureEl.offsetWidth;
                document.body.removeChild(measureEl);

                const maxWidth = vw - 40;
                let finalFontSize = 18;
                if (textWidth > maxWidth) {
                    finalFontSize = Math.floor(18 * (maxWidth / textWidth) * 0.95);
                    if (finalFontSize < 14) finalFontSize = 14;
                }

                let left = x;
                const halfWidth = Math.min(textWidth, maxWidth) / 2;
                if (left - halfWidth < 20) left = 20 + halfWidth;
                if (left + halfWidth > vw - 20) left = vw - 20 - halfWidth;

                const el = document.createElement('div');
                el.className = 'pop-text start';
                el.textContent = msg;

                const grad = randomPick(GRADIENTS);
                el.style.background = grad;
                el.style.backgroundClip = 'text';
                el.style.webkitBackgroundClip = 'text';
                el.style.color = 'transparent';

                el.style.left = left + 'px';
                el.style.top = targetY + 'px';
                if (finalFontSize !== 18) {
                    el.style.fontSize = finalFontSize + 'px';
                }

                document.body.appendChild(el);

                requestAnimationFrame(() => {
                    el.classList.remove('start');
                    el.classList.add('fade-in');
                });

                const DISPLAY_DURATION = 2000 + Math.random() * 500;
                setTimeout(() => {
                    el.classList.remove('fade-in');
                    el.classList.add('fade-out');
                    setTimeout(() => {
                        if (el.parentNode) el.remove();
                    }, 400);
                }, DISPLAY_DURATION);
            }

            document.addEventListener('click', handleFloatingText);
            document.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) handleFloatingText(e);
            }, { passive: true });

            document.addEventListener('selectstart', function(e) { e.preventDefault(); }, { passive: true });

            console.log('✦ 渐变浮动文字已加载（18px） ✦');
        }

        // ============================================================
        // 管理面板（原有）
        // ============================================================
        (function() {
            const secretCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft',
                'ArrowRight'
            ];
            let inputIndex = 0;
            const fab = document.getElementById('adminFab');
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName ===
                    'SELECT') return;
                if (e.key === secretCode[inputIndex]) {
                    inputIndex++;
                    if (inputIndex === secretCode.length) {
                        inputIndex = 0;
                        fab.style.display = 'flex';
                        fab.style.transform = 'scale(1.2)';
                        setTimeout(() => fab.style.transform = 'scale(1)', 150);
                        const toast = document.createElement('div');
                        toast.style.cssText = `
                                position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
                                background: #1e293b; color: #fbbf24; padding: 8px 20px;
                                border-radius: 40px; font-size: 0.9rem; font-weight: 600;
                                z-index: 9998; border: 1px solid #fbbf24;
                                animation: fadeIn 0.3s ease;
                            `;
                        toast.textContent = '🔓 管理模式已解锁';
                        document.body.appendChild(toast);
                        setTimeout(() => toast.remove(), 2000);
                    }
                } else {
                    inputIndex = 0;
                }
            });
        })();

        const adminModal = document.getElementById('adminModal');
        const closeAdminBtn = document.getElementById('closeAdminBtn');
        const adminForm = document.getElementById('adminForm');
        const adminEn = document.getElementById('adminEn');
        const adminZh = document.getElementById('adminZh');
        const adminLane = document.getElementById('adminLane');
        const adminTier = document.getElementById('adminTier');
        const adminStatus = document.getElementById('adminStatus');
        const adminSubmitBtn = document.getElementById('adminSubmitBtn');
        const adminStatusMsg = document.getElementById('adminStatusMsg');
        const avatarFileInput = document.getElementById('avatarFileInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const clearAvatarBtn = document.getElementById('clearAvatarBtn');
        let selectedAvatarFile = null;

        document.getElementById('adminFab').addEventListener('click', function() {
            adminModal.classList.add('open');
            adminStatusMsg.className = 'admin-status-msg';
            adminStatusMsg.textContent = '';
            avatarPreview.style.display = 'none';
            avatarPreview.src = '';
            selectedAvatarFile = null;
            avatarFileInput.value = '';
            setTimeout(() => adminEn.focus(), 100);
        });

        function closeAdminPanel() {
            adminModal.classList.remove('open');
            adminStatusMsg.className = 'admin-status-msg';
            adminStatusMsg.textContent = '';
            avatarPreview.style.display = 'none';
            avatarPreview.src = '';
            selectedAvatarFile = null;
            avatarFileInput.value = '';
        }
        closeAdminBtn.addEventListener('click', closeAdminPanel);
        adminModal.addEventListener('click', function(e) {
            if (e.target === adminModal) closeAdminPanel();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && adminModal.classList.contains('open')) {
                closeAdminPanel();
            }
        });

        avatarFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (!file.type.startsWith('image/')) { alert('请选择图片文件');
                    avatarFileInput.value = '';
                    return; }
                if (file.size > 2 * 1024 * 1024) { alert('图片大小不能超过 2MB');
                    avatarFileInput.value = '';
                    return; }
                selectedAvatarFile = file;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    avatarPreview.src = ev.target.result;
                    avatarPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                selectedAvatarFile = null;
                avatarPreview.style.display = 'none';
                avatarPreview.src = '';
            }
        });
        clearAvatarBtn.addEventListener('click', function() {
            avatarFileInput.value = '';
            selectedAvatarFile = null;
            avatarPreview.style.display = 'none';
            avatarPreview.src = '';
        });

        async function uploadAvatar(file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabaseClient.storage.from('avatars').upload(fileName, file, { cacheControl: '3600',
                upsert: false });
            if (error) throw error;
            const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        adminForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const en = adminEn.value.trim();
            const zh = adminZh.value.trim();
            const lane = adminLane.value.trim() || 'top';
            const tier = adminTier.value || '';
            const status = adminStatus.value || 'normal';
            if (!en || !zh) {
                adminStatusMsg.textContent = '⚠️ 英文名和中文名不能为空';
                adminStatusMsg.className = 'admin-status-msg error';
                return;
            }
            if (!supabaseClient || !isSupabaseAvailable) {
                adminStatusMsg.textContent = '❌ 数据库未连接，请检查网络';
                adminStatusMsg.className = 'admin-status-msg error';
                return;
            }
            adminSubmitBtn.disabled = true;
            adminSubmitBtn.textContent = '上传中...';
            try {
                let avatarUrl = null;
                if (selectedAvatarFile) {
                    adminSubmitBtn.textContent = '上传头像...';
                    avatarUrl = await uploadAvatar(selectedAvatarFile);
                }
                adminSubmitBtn.textContent = '添加英雄...';
                const { data, error } = await supabaseClient
                    .from('heroes')
                    .insert([{ en, zh, lane, tier, status, avatar_url: avatarUrl }])
                    .select();
                if (error) throw error;
                adminStatusMsg.textContent = '✅ 英雄添加成功！刷新列表中...';
                adminStatusMsg.className = 'admin-status-msg success';
                adminSubmitBtn.textContent = '已添加';
                adminEn.value = '';
                adminZh.value = '';
                adminLane.value = 'top';
                adminTier.value = '';
                adminStatus.value = 'normal';
                avatarFileInput.value = '';
                selectedAvatarFile = null;
                avatarPreview.style.display = 'none';
                avatarPreview.src = '';
                await loadHeroesData();
                await updateAllLanesWithAnimation();
                adminSubmitBtn.disabled = false;
                adminSubmitBtn.textContent = '添加英雄';
                setTimeout(() => closeAdminPanel(), 1200);
            } catch (err) {
                console.error('添加英雄失败', err);
                adminStatusMsg.textContent = '❌ 添加失败：' + err.message;
                adminStatusMsg.className = 'admin-status-msg error';
                adminSubmitBtn.disabled = false;
                adminSubmitBtn.textContent = '添加英雄';
            }
        });
    </script>
</body>
</html>
